<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShieldGig — Signup</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
    --border: #232733; --accent: #f97316; --accent2: #3b82f6;
    --accent3: #10b981; --warn: #ef4444;
    --text: #e8eaf0; --muted: #6b7280; --gold: #fbbf24;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse 70% 60% at 30% 20%, rgba(249,115,22,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 70% 80%, rgba(59,130,246,0.06) 0%, transparent 60%);
    pointer-events:none;
  }

  /* Grid bg */
  .grid-bg {
    position: fixed; inset:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(35,39,51,0.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(35,39,51,0.4) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
  }

  .login-wrap {
    position: relative; z-index: 1;
    display: flex; gap: 80px; align-items: center; justify-content: center;
    width: 100%; max-width: 980px; padding: 32px;
  }

  /* Right form */
  .login-card {
    width: 380px; flex-shrink:0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 36px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
  }
  .card-title { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
  .card-subtitle { color:var(--muted); font-size:13px; margin-top:4px; }

  .form-group { margin-top:16px; }
  .form-label { font-size:11px; font-family:'Space Mono',monospace; color:var(--muted); letter-spacing:0.8px; margin-bottom:7px; display:block; }
  .form-input {
    width:100%; background:var(--surface2);
    border:1px solid var(--border); border-radius:10px;
    padding:12px 14px; color:var(--text);
    font-size:14px; font-family:'DM Sans',sans-serif;
    transition:border-color 0.2s;
    outline:none;
  }
  .form-input:focus { border-color:var(--accent); }
  .form-input::placeholder { color:var(--muted); }

  .form-input-wrap { position:relative; }
  .eye-toggle {
    position:absolute; right:12px; top:50%; transform:translateY(-50%);
    cursor:pointer; font-size:16px; color:var(--muted);
    background:none; border:none; padding:0;
    transition:color 0.2s;
  }
  .eye-toggle:hover { color:var(--text); }

  .submit-btn {
    width:100%; margin-top:24px;
    background:var(--accent); color:#fff;
    border:none; border-radius:10px;
    padding:14px; font-size:15px; font-weight:700;
    cursor:pointer; font-family:'Syne',sans-serif;
    transition:opacity 0.2s, transform 0.1s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .submit-btn:hover { opacity:0.9; transform:translateY(-1px); }
  .submit-btn:active { transform:translateY(0); }
  .submit-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

  .error-msg {
    margin-top:14px; padding:10px 14px;
    background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
    border-radius:8px; font-size:13px; color:#fca5a5;
    display:none;
  }

  .divider { height:1px; background:var(--border); margin:20px 0; }

  .session-note {
    font-size:11px; color:var(--muted); text-align:center;
    line-height:1.6;
  }

  .spinner {
    width:16px; height:16px; border:2px solid rgba(255,255,255,0.3);
    border-top-color:#fff; border-radius:50%;
    animation: spin 0.6s linear infinite; display:none;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  .loading .spinner { display:block; }
  .loading .btn-text { display:none; }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="login-wrap">
  <!-- Login Card -->
  <div class="login-card">
    <div class="card-title">Create Pilot Account</div>
    <div class="card-subtitle">Join ShieldGig Parametric Insurance</div>

    <div class="form-group">
      <label class="form-label" for="full_name">FULL NAME</label>
      <input class="form-input" type="text" id="full_name" name="full_name"
        placeholder="e.g. Raju Kumar">
    </div>

    <div class="form-group">
      <label class="form-label" for="phone">PHONE NUMBER</label>
      <input class="form-input" type="text" id="phone" name="phone"
        placeholder="e.g. 9876543210">
    </div>

    <div class="form-group">
      <label class="form-label" for="zone">CITY / ZONE</label>
      <input class="form-input" type="text" id="zone" name="zone"
        placeholder="e.g. Bangalore South">
    </div>

    <div class="form-group">
      <label class="form-label" for="password">CREATE PASSWORD</label>
      <div class="form-input-wrap">
        <input class="form-input" type="password" id="password" name="password"
          placeholder="••••••••" autocomplete="new-password">
        <button class="eye-toggle" type="button" onclick="togglePwd()" id="eyeBtn">👁️</button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="submit-btn" id="signupBtn" onclick="doSignup()">
      <div class="spinner" id="spinner"></div>
      <span class="btn-text">Sign Up & Join →</span>
    </button>

    <div class="divider"></div>
    <div style="text-align:center; font-size:13px; margin-bottom:14px;">
      Already have an ID? <a href="/login" style="color:var(--accent); text-decoration:none; font-weight:700;">Sign in here</a>
    </div>
    <div class="session-note">
      🔐 Secured with JWT · HttpOnly Cookie<br>
      You will be generated a Rider ID upon success.
    </div>
  </div>
</div>

<script>
  function togglePwd() {
    const inp = document.getElementById('password');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    document.getElementById('eyeBtn').textContent = inp.type === 'password' ? '👁️' : '🙈';
  }

  async function doSignup() {
    const full_name = document.getElementById('full_name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const zone = document.getElementById('zone').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn = document.getElementById('signupBtn');
    const err = document.getElementById('errorMsg');

    if (!full_name || !phone || !zone || !password) {
      showError('Please fill out all fields.');
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');
    err.style.display = 'none';

    const form = new FormData();
    form.append('name', full_name);
    form.append('phone', phone);
    form.append('zone', zone);
    form.append('password', password);

    try {
      const res = await fetch('/auth/signup', { method:'POST', body: form });
      const data = await res.json();

      if (data.success) {
        btn.innerHTML = '✓ Account Created!';
        btn.style.background = 'var(--accent3)';
        setTimeout(() => { window.location.href = data.redirect; }, 600);
      } else {
        showError(data.detail || 'Signup failed. Please try again.');
        btn.disabled = false;
        btn.classList.remove('loading');
      }
    } catch(e) {
      showError('Server error. Make sure the FastAPI backend is running.');
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = '⚠️ ' + msg;
    err.style.display = 'block';
  }

  // Enter key submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSignup();
  });
</script>
</body>
</html>
